<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>霓虹星空时钟</title>
    <style>
      :root {
        --bg-1: #0b1021;
        --bg-2: #161c3b;
        --primary: #67e8f9;
        --secondary: #a78bfa;
        --accent: #f472b6;
        --text: #e2e8f0;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: "SF Pro Display", "PingFang SC", "Microsoft YaHei", sans-serif;
        background:
          radial-gradient(circle at 20% 20%, rgba(103, 232, 249, 0.22), transparent 32%),
          radial-gradient(circle at 80% 25%, rgba(167, 139, 250, 0.25), transparent 30%),
          radial-gradient(circle at 50% 85%, rgba(244, 114, 182, 0.2), transparent 34%),
          linear-gradient(145deg, var(--bg-1), var(--bg-2));
        color: var(--text);
        overflow: hidden;
      }

      .stars,
      .stars::before,
      .stars::after {
        position: fixed;
        inset: 0;
        content: "";
        pointer-events: none;
        background-image: radial-gradient(2px 2px at 20px 30px, #ffffffd8 99%, transparent),
          radial-gradient(1.5px 1.5px at 80px 120px, #ffffffcc 99%, transparent),
          radial-gradient(1.2px 1.2px at 140px 60px, #ffffff99 99%, transparent),
          radial-gradient(1.8px 1.8px at 200px 200px, #ffffffcc 99%, transparent),
          radial-gradient(1px 1px at 260px 90px, #ffffff88 99%, transparent);
        background-size: 280px 240px;
        animation: twinkle 8s linear infinite;
      }

      .stars::before {
        opacity: 0.45;
        transform: scale(1.35);
        animation-duration: 12s;
      }

      .stars::after {
        opacity: 0.3;
        transform: scale(1.75);
        animation-duration: 16s;
      }

      @keyframes twinkle {
        from {
          transform: translateY(0);
        }
        to {
          transform: translateY(-240px);
        }
      }

      .clock-card {
        position: relative;
        width: min(92vw, 720px);
        padding: 2.4rem 2rem 1.8rem;
        border-radius: 28px;
        backdrop-filter: blur(14px);
        background: linear-gradient(
          135deg,
          rgba(15, 23, 42, 0.58),
          rgba(30, 41, 59, 0.38)
        );
        border: 1px solid rgba(255, 255, 255, 0.16);
        box-shadow: 0 28px 65px rgba(2, 6, 23, 0.58), inset 0 0 0 1px rgba(255, 255, 255, 0.08);
      }

      .glow {
        position: absolute;
        inset: -2px;
        border-radius: inherit;
        background: linear-gradient(120deg, #67e8f944, #a78bfa66, #f472b644);
        z-index: -1;
        filter: blur(12px);
      }

      h1 {
        margin: 0;
        text-align: center;
        font-size: clamp(1.1rem, 2.5vw, 1.45rem);
        letter-spacing: 0.12em;
        font-weight: 600;
        color: #cbd5e1;
      }

      .time {
        margin-top: 0.8rem;
        text-align: center;
        font-size: clamp(2.8rem, 11vw, 6.2rem);
        font-weight: 700;
        letter-spacing: 0.08em;
        color: #f8fafc;
        text-shadow: 0 0 20px rgba(103, 232, 249, 0.38), 0 0 42px rgba(167, 139, 250, 0.3);
        font-variant-numeric: tabular-nums;
      }

      .meta {
        margin-top: 0.8rem;
        display: flex;
        justify-content: center;
        gap: 0.75rem;
        flex-wrap: wrap;
      }

      .pill {
        padding: 0.42rem 0.8rem;
        border-radius: 999px;
        font-size: 0.9rem;
        background: rgba(148, 163, 184, 0.16);
        border: 1px solid rgba(148, 163, 184, 0.32);
        color: #e2e8f0;
      }

      .tip {
        margin-top: 1rem;
        text-align: center;
        font-size: 0.86rem;
        opacity: 0.8;
      }

      @media (max-width: 480px) {
        .clock-card {
          padding: 1.8rem 1.1rem 1.2rem;
          border-radius: 20px;
        }
      }
    </style>
  </head>
  <body>
    <div class="stars" aria-hidden="true"></div>

    <main class="clock-card" role="main" aria-label="漂亮的实时时钟">
      <div class="glow" aria-hidden="true"></div>
      <h1>NEON DIGITAL CLOCK</h1>
      <div class="time" id="time">00:00:00</div>
      <section class="meta">
        <div class="pill" id="date">--</div>
        <div class="pill" id="weekday">--</div>
        <div class="pill" id="timezone">--</div>
      </section>
      <p class="tip">每一秒，都闪闪发光 ✨</p>
    </main>

    <script>
      const timeEl = document.getElementById("time");
      const dateEl = document.getElementById("date");
      const weekdayEl = document.getElementById("weekday");
      const timezoneEl = document.getElementById("timezone");

      const weekdayNames = ["周日", "周一", "周二", "周三", "周四", "周五", "周六"];

      const pad = (n) => String(n).padStart(2, "0");

      function updateClock() {
        const now = new Date();
        const hh = pad(now.getHours());
        const mm = pad(now.getMinutes());
        const ss = pad(now.getSeconds());

        timeEl.textContent = `${hh}:${mm}:${ss}`;

        const y = now.getFullYear();
        const m = pad(now.getMonth() + 1);
        const d = pad(now.getDate());
        dateEl.textContent = `${y}-${m}-${d}`;
        weekdayEl.textContent = weekdayNames[now.getDay()];

        const tz = Intl.DateTimeFormat().resolvedOptions().timeZone;
        timezoneEl.textContent = tz || "Local Time";
      }

      updateClock();
      setInterval(updateClock, 1000);
    </script>
  </body>
</html>
